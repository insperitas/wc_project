openapi: 3.0.3
info:
  title: WindowCleanr API
  version: 0.1.0
  description: Core API for customer, cleaner, and admin operations.

servers:
  - url: http://localhost:8000

paths:
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created

  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK

  /areas:
    get:
      summary: List service areas or find area by location
      parameters:
        - in: query
          name: lat
          schema:
            type: number
        - in: query
          name: lng
          schema:
            type: number
      responses:
        '200':
          description: List of areas

  /bookings:
    post:
      summary: Create a booking/request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
      responses:
        '201':
          description: Booking created

  /bookings/{bookingId}:
    get:
      summary: Get booking status
      parameters:
        - in: path
          name: bookingId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Booking object

  /quotes:
    post:
      summary: Cleaner submits a quote for a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
      responses:
        '201':
          description: Quote submitted

  /payments/create:
    post:
      summary: Create payment intent (integrate with Stripe)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreate'
      responses:
        '200':
          description: Payment intent created

  /ratings:
    post:
      summary: Submit rating for a completed booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingRequest'
      responses:
        '201':
          description: Rating saved

components:
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        role:
          type: string
          enum: [customer, cleaner]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    BookingRequest:
      type: object
      required: [customer_id, address, house_style]
      properties:
        customer_id:
          type: string
        address:
          type: object
          properties:
            line1: { type: string }
            city: { type: string }
            postcode: { type: string }
        house_style:
          type: string
        house_size_estimate:
          type: string

    QuoteRequest:
      type: object
      required: [booking_id, cleaner_id, amount_cents]
      properties:
        booking_id: { type: string }
        cleaner_id: { type: string }
        amount_cents: { type: integer }
        currency: { type: string, default: 'GBP' }

    PaymentCreate:
      type: object
      required: [booking_id, amount_cents, currency]
      properties:
        booking_id: { type: string }
        amount_cents: { type: integer }
        currency: { type: string }

    RatingRequest:
      type: object
      required: [booking_id, rating]
      properties:
        booking_id: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        review: { type: string }
